{% extends 'base.html' %}
{% load static %}

{% block content %}
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const hasSuccess = {% if messages %}true{% else %}false{% endif %};
            
            useEffect(() => {
                const handleMouseMove = (event) => {
                    const x = Math.round((event.clientX / window.innerWidth) * 100);
                    const y = Math.round((event.clientY / window.innerHeight) * 100);
                    document.documentElement.style.setProperty('--mouse-x', `${x}%`);
                    document.documentElement.style.setProperty('--mouse-y', `${y}%`);
                };
                
                window.addEventListener('mousemove', handleMouseMove);
                
                // Set initial position
                document.documentElement.style.setProperty('--mouse-x', '50%');
                document.documentElement.style.setProperty('--mouse-y', '50%');
                
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            return (
                <div className="min-h-screen font-inter flex flex-col">
                    {/* Header */}
                    <header className="absolute top-0 left-0 w-full z-50 p-6 md:px-12 flex justify-between items-center text-neutral-offwhite">
                        <div className="flex items-baseline cursor-pointer" onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}>
                            <span className="font-lobster text-2xl tracking-wide text-primary-gold pr-2 lowercase drop-shadow-md">baylor</span>
                            <span className="font-inter font-bold text-xl tracking-widest drop-shadow-md">SHARE</span>
                        </div>
                    </header>

                    {/* Section 1: Hero */}
                    <section className="h-screen mesh-gradient flex justify-center items-center relative overflow-hidden text-neutral-offwhite">
                        <div className="flex flex-col md:flex-row items-center justify-center gap-12 z-10 p-6 max-w-6xl w-full">
                            {/* Visual Element (Left) */}
                            <div className="w-56 h-56 md:w-[22rem] md:h-[22rem] rounded-full overflow-hidden border-2 border-primary-gold/20 shadow-2xl flex-shrink-0 bg-white">
                                <img 
                                    src="{% static 'images/logo.jpg' %}" 
                                    alt="Share Bear Logo" 
                                    className="w-full h-full object-cover"
                                />
                            </div>
                            
                            {/* Selectable Text Element (Right) */}
                            <div className="text-center md:text-left selection:bg-primary-gold selection:text-primary-green flex-1">
                                <div className="mb-6 flex flex-wrap items-baseline justify-center md:justify-start drop-shadow-[0_4px_12px_rgba(0,0,0,0.6)]">
                                    <span className="font-lobster text-7xl md:text-[6rem] tracking-wide text-primary-gold pr-4 lowercase">baylor</span>
                                    <span className="font-inter font-bold text-6xl md:text-[5.5rem] tracking-widest text-neutral-offwhite uppercase">SHARE</span>
                                </div>
                                <p className="font-inter text-lg md:text-xl text-neutral-offwhite/90 font-medium max-w-lg drop-shadow-md mb-10 mx-auto md:mx-0">
                                    A curated collegiate reuse experience. Access the early waitlist and secure your spot in our invite-only community.
                                </p>
                                
                                <button 
                                    onClick={() => window.scrollTo({top: window.innerHeight, behavior: 'smooth'})}
                                    className="bg-primary-green hover:bg-primary-gold text-neutral-offwhite hover:text-primary-green font-bold py-4 px-8 rounded-sm transition-all duration-300 shadow-[0_4px_14px_0_rgba(21,71,52,0.5)] hover:shadow-[0_6px_20px_rgba(208,145,33,0.5)] hover:-translate-y-0.5 tracking-wider text-sm relative z-20"
                                >
                                    REQUEST AN INVITE &rarr;
                                </button>
                            </div>
                        </div>
                        
                        <div className="fade-to-white"></div>

                        <div className="absolute bottom-10 z-20 animate-bounce-slow flex flex-col items-center cursor-pointer" onClick={() => window.scrollTo({top: window.innerHeight, behavior: 'smooth'})}>
                            <span className="text-sm font-bold tracking-widest uppercase mb-2 text-primary-green drop-shadow-[0_0_2px_rgba(255,255,255,0.8)] animate-pulse">SCROLL</span>
                            <svg className="w-6 h-6 text-primary-green drop-shadow-[0_0_2px_rgba(255,255,255,0.8)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                            </svg>
                        </div>
                    </section>

                    {/* Section 2: Form */}
                    <section className="min-h-screen bg-white flex justify-center items-center py-20 px-4 transition-colors duration-700">
                        <div className="bg-white p-8 md:p-12 rounded-xl shadow-[0_10px_40px_rgb(0,0,0,0.08)] w-full max-w-xl border border-neutral-200 z-10">
                            {hasSuccess ? (
                                <div className="text-center py-12 animate-fade-in">
                                    <div className="w-20 h-20 mx-auto bg-primary-green/10 text-primary-green rounded-full flex items-center justify-center mb-6">
                                        <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                                        </svg>
                                    </div>
                                    <h3 className="text-4xl font-oswald font-bold text-primary-forest mb-3">Thanks for joining!</h3>
                                    <p className="text-neutral-darkgray/80 text-lg">We'll let you know when we launch.</p>
                                    <button 
                                        onClick={() => window.location.href='/'} 
                                        className="mt-8 text-primary-green font-bold hover:text-primary-gold transition-colors"
                                    >
                                        &larr; Back to home
                                    </button>
                                </div>
                            ) : (
                                <form method="post" action="{% url 'home' %}" className="space-y-6">
                                    <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}" />
                                    <div className="text-center mb-10">
                                        <h3 className="font-oswald font-bold text-4xl md:text-5xl text-primary-forest mb-3 tracking-wide">The Registry is Opening.</h3>
                                        <p className="text-neutral-darkgray/80 text-sm md:text-base font-medium">Be the first to trade, buy, and curate your collegiate space. No fees, just Bear-to-Bear.</p>
                                        
                                        {% if form.errors %}
                                            <div className="mt-6 p-4 bg-accent-red/10 border border-accent-red/20 text-accent-red rounded-lg text-sm text-left shadow-sm">
                                                <ul className="list-disc pl-5 space-y-1">
                                                    {% for field in form %}
                                                        {% for error in field.errors %}
                                                            <li className="font-medium">{{ error }}</li>
                                                        {% endfor %}
                                                    {% endfor %}
                                                    {% for error in form.non_field_errors %}
                                                        <li className="font-medium">{{ error }}</li>
                                                    {% endfor %}
                                                </ul>
                                            </div>
                                        {% endif %}
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div>
                                            <label className="block text-sm font-bold text-primary-forest mb-1.5 uppercase tracking-wide">First Name</label>
                                            <input 
                                                type="text" 
                                                name="first_name" 
                                                required 
                                                defaultValue="{% if form.first_name.value %}{{ form.first_name.value }}{% endif %}"
                                                className="w-full px-4 py-3 bg-white border border-neutral-300 rounded focus:ring-2 focus:ring-primary-green focus:border-transparent outline-none transition-all text-neutral-darkgray font-medium" 
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-primary-forest mb-1.5 uppercase tracking-wide">Last Name</label>
                                            <input 
                                                type="text" 
                                                name="last_name" 
                                                required 
                                                defaultValue="{% if form.last_name.value %}{{ form.last_name.value }}{% endif %}"
                                                className="w-full px-4 py-3 bg-white border border-neutral-300 rounded focus:ring-2 focus:ring-primary-green focus:border-transparent outline-none transition-all text-neutral-darkgray font-medium" 
                                            />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold text-primary-forest mb-1.5 uppercase tracking-wide">Baylor Email</label>
                                        <input 
                                            type="email" 
                                            name="email" 
                                            required 
                                            placeholder="first_last@baylor.edu" 
                                            defaultValue="{% if form.email.value %}{{ form.email.value }}{% endif %}"
                                            className="w-full px-4 py-3 bg-white border border-neutral-300 rounded focus:ring-2 focus:ring-primary-green focus:border-transparent outline-none transition-all text-neutral-darkgray font-medium" 
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold text-primary-forest mb-1.5 uppercase tracking-wide">Classification</label>
                                        <div className="relative">
                                            <select 
                                                name="year" 
                                                required 
                                                defaultValue="{% if form.year.value %}{{ form.year.value }}{% endif %}"
                                                className="w-full px-4 py-3 bg-white border border-neutral-300 rounded focus:ring-2 focus:ring-primary-green focus:border-transparent outline-none transition-all appearance-none text-neutral-darkgray font-medium"
                                            >
                                                <option value="" disabled>Select your year...</option>
                                                <option value="FRESHMAN">Freshman</option>
                                                <option value="SOPHOMORE">Sophomore</option>
                                                <option value="JUNIOR">Junior</option>
                                                <option value="SENIOR">Senior</option>
                                                <option value="GRADUATE">Graduate</option>
                                            </select>
                                            <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-neutral-darkgray">
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                                                </svg>
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold text-primary-forest mb-3 uppercase tracking-wide">Intent</label>
                                        <div className="flex gap-4">
                                            <label className="flex-1 cursor-pointer group">
                                                <input type="radio" name="intent" value="BUY" className="peer sr-only" />
                                                <div className="text-center py-3 rounded border-2 border-neutral-300 text-neutral-darkgray peer-checked:bg-primary-green peer-checked:text-neutral-offwhite peer-checked:border-primary-green transition-all font-bold group-hover:border-primary-gold group-hover:text-primary-gold peer-checked:group-hover:text-neutral-offwhite">
                                                    BUY
                                                </div>
                                            </label>
                                            <label className="flex-1 cursor-pointer group">
                                                <input type="radio" name="intent" value="SELL" className="peer sr-only" />
                                                <div className="text-center py-3 rounded border-2 border-neutral-300 text-neutral-darkgray peer-checked:bg-primary-green peer-checked:text-neutral-offwhite peer-checked:border-primary-green transition-all font-bold group-hover:border-primary-gold group-hover:text-primary-gold peer-checked:group-hover:text-neutral-offwhite">
                                                    SELL
                                                </div>
                                            </label>
                                            <label className="flex-1 cursor-pointer group">
                                                <input type="radio" name="intent" value="BOTH" defaultChecked className="peer sr-only" />
                                                <div className="text-center py-3 rounded border-2 border-neutral-300 text-neutral-darkgray peer-checked:bg-primary-green peer-checked:text-neutral-offwhite peer-checked:border-primary-green transition-all font-bold group-hover:border-primary-gold group-hover:text-primary-gold peer-checked:group-hover:text-neutral-offwhite">
                                                    BOTH
                                                </div>
                                            </label>
                                        </div>
                                    </div>

                                    <button 
                                        type="submit" 
                                        className="w-full bg-primary-green hover:bg-primary-forest text-neutral-offwhite font-oswald tracking-widest text-xl py-4 rounded transition-all shadow-[0_4px_14px_0_rgba(21,71,52,0.39)] hover:shadow-[0_6px_20px_rgba(21,71,52,0.23)] hover:-translate-y-0.5 mt-8 uppercase"
                                    >
                                        Join the Waitlist
                                    </button>
                                </form>
                            )}
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-neutral-darkgray text-neutral-offwhite/80 py-8 px-6 text-center text-sm">
                        <div className="max-w-4xl mx-auto flex flex-col items-center gap-4">
                            <div className="flex items-baseline opacity-80">
                                <span className="font-lobster text-xl tracking-wide text-primary-gold pr-2 lowercase">baylor</span>
                                <span className="font-inter font-bold text-lg tracking-widest text-neutral-offwhite">SHARE</span>
                            </div>
                            <p>&copy; {new Date().getFullYear()} baylor SHARE. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
{% endblock %}
