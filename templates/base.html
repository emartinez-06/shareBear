<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}baylor SHARE{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            green: '#154734', /* PMS 7743 */
                            gold: '#D09121', /* PMS 7555 */
                            forest: '#007A33', /* PMS 356 */
                        },
                        secondary: {
                            green: '#00705E', /* PMS 3298 */
                        },
                        accent: {
                            red: '#9A2B22', /* PMS 484 */
                            blue: '#00678F', /* PMS 7700 */
                        },
                        neutral: {
                            offwhite: '#E4E0D7', /* PMS 9081 */
                            coolgray: '#C8C9C7', /* Cool Gray 3 */
                            darkgray: '#4B4F54',
                        }
                    },
                    fontFamily: {
                        'oswald': ['Oswald', 'sans-serif'],
                        'lobster': ['"Lobster Two"', 'cursive'],
                        'inter': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React and ReactDOM (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom Styles for Mesh Gradient and Animations */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #E4E0D7;
        }

        .mesh-gradient {
            background-color: #154734;
            background-image: 
                radial-gradient(at var(--mouse-x, 0%) var(--mouse-y, 0%), rgba(0, 103, 143, 0.8) 0px, transparent 60%),
                radial-gradient(at calc(100% - var(--mouse-x, 0%)) var(--mouse-y, 50%), rgba(154, 43, 34, 0.9) 0px, transparent 60%),
                radial-gradient(at var(--mouse-x, 100%) calc(100% - var(--mouse-y, 0%)), rgba(0, 112, 94, 0.8) 0px, transparent 50%),
                radial-gradient(at calc(100% - var(--mouse-x, 0%)) calc(100% - var(--mouse-y, 0%)), rgba(208, 145, 33, 0.8) 0px, transparent 60%),
                radial-gradient(at 50% var(--mouse-y, 100%), rgba(0, 122, 51, 0.8) 0px, transparent 50%);
            background-size: 100% 100%;
        }

        .fade-to-white {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 100%);
            pointer-events: none;
            z-index: 5;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }
    </style>

    <!-- Vercel Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script>
      window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
