{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SHARE Bear{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003020',
                        'primary-container': '#154734',
                        'on-primary': '#ffffff',
                        'secondary-container': '#feb71a',
                        'on-secondary-container': '#6b4b00',
                        'tertiary-container': '#004a10',
                        'on-tertiary-fixed': '#002204',
                        surface: '#f6faf6',
                        'surface-container-low': '#edf4ee',
                        'surface-container': '#e4eee6',
                        'surface-container-high': '#d8e6db',
                        'surface-container-highest': '#cbdccf',
                        'surface-container-lowest': '#ffffff',
                        'on-surface': '#191c1c',
                        'on-surface-variant': '#414944',
                        'outline-variant': '#b8c8bc',
                    },
                    fontFamily: {
                        display: ['Manrope', 'sans-serif'],
                        body: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    letterSpacing: {
                        tightest: '-.02em',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            font-family: theme('fontFamily.body');
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: theme('fontFamily.display');
        }

        /* Ambient Shadow for floating elements */
        .ambient-shadow {
            box-shadow: 0 20px 40px -4px rgba(0, 48, 32, 0.04);
        }
        
        .ambient-shadow-lg {
            box-shadow: 0 32px 64px -8px rgba(0, 48, 32, 0.06);
        }

        /* Input field specific styling */
        .input-underline {
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s ease;
        }
        .input-underline:focus {
            border-bottom-color: theme('colors.primary');
        }
        
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
    </style>

    <!-- Vercel Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script>
      window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body class="antialiased min-h-screen flex flex-col">
    <!-- Header -->
    <header class="w-full py-6 px-8 md:px-16 flex justify-between items-center bg-surface sticky top-0 z-50">
        <a href="{% url 'home' %}" class="flex items-center gap-3">
            <img src="{% static 'images/bearLogo.png' %}" alt="SHARE Bear Logo" class="w-8 h-8 rounded-lg object-cover">
            <span class="font-display font-bold text-lg tracking-tightest text-primary">SHARE Bear</span>
        </a>
        <nav class="flex items-center gap-8 font-body font-medium text-sm">
            <a href="{% url 'process' %}" class="text-on-surface-variant hover:text-primary transition-colors">Process</a>
            <a href="{% url 'home' %}#waitlist" class="bg-primary text-on-primary px-6 py-2.5 rounded-xl hover:bg-primary-container transition-colors shadow-sm">Join Waitlist</a>
        </nav>
    </header>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    <footer class="w-full py-12 px-8 md:px-16 flex flex-col md:flex-row justify-between items-center border-t border-outline-variant/15 mt-20 text-xs font-body text-on-surface-variant">
        <div class="mb-4 md:mb-0">
            <span class="font-display font-bold text-sm text-primary uppercase tracking-widest block mb-1">SHARE Bear</span>
            &copy; 2026. Created in collaboration with 180 Degrees Consulting BU and Baylor UIF.
        </div>
        <div class="flex gap-6">
            <a href="{% url 'privacy' %}" class="hover:text-primary transition-colors">Privacy</a>
            <a href="{% url 'terms' %}" class="hover:text-primary transition-colors">Terms</a>
        </div>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
